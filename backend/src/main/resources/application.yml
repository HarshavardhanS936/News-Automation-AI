spring:
  application:
    name: news-aggregator
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/news_aggregator?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: ${PORT:8081}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
newsapi:
  key: "9f4c4a5e30a54b09bb8d2c931ab236f6"

gemini:
  api:
    key: "AQ.Ab8RN6IbuelpFTsStuM-jxq0IemHLSidcnWy6cROnMnOA45Rmw"
